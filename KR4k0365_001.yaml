body:
  text: 晉諸公別傳王祥晉受禪時廊廟之士莫不懽容而祥色不加怡時人為之語曰王公恨恨有送故之情也御覽四百九十六羊祜昔有攘羊遺叔向之母母埋之後事發檢羊肉盡唯舌存遂以羊舌為氏族祜其後也御覽四百二十六先時吳童謠云阿童復阿童銜刀浮渡江不畏岸上虎但畏水中龍祜聞之曰此必水軍有功即王濬為龍驤將軍謀伐吳同上二百三十九祜周行賊境七百餘里往反四十餘日刈賊穀以為軍糧皆計頃畝送絹還直使如穀價同上八百三十七裴楷裴楷少知名而風情朗悟初陳留阮籍遭母喪楷弱冠往弔籍乃離喪位神志晏然至乃縱情嘯咏傍若無人楷不為改容行止自若遂使率情獨哭哭畢而退威容舉動無異御覽五百六十一石崇嘗與裴楷孫綽醉宴而綽慢節過崇責之楷曰季舒酒狂四海所知足下飲人狂藥責人正禮同上七百三十九賈充等治法律楷亦參典其事事畢詔專讀奏平章當否楷善能諷誦音聲朗暢執刑書穆若清詠焉同上三百八十八衛玠衛玠字叔寶御覽二百九玠有虛令之秀清勝之氣在群伍之中有異人之望祖太保見玠五歲曰此兒神爽聰令與眾大異恐吾老不及見爾世說注四玠在群伍之中實有異人之望齠齔時武子常與乘白羊車于洛陽市上舉市咸曰誰家璧人玠武子甥也于是家門州黨號為璧人世說注六初學記十九御覽五百二十一驃騎王濟玠之舅也嘗與同遊語人曰昨日與外甥出冏若明珠之在我側朗然來照人世說注六初學記十九御覽五百二十一玠小有名理善通莊老琅邪王平子高氣不群邁世獨傲每聞玠之相議至于理會之閒要妙之際輒絕倒于坐前後三聞為之三倒時人遂曰衛君談道平子三倒世說注五陳留阮千里有令聞當年太尉王君見而問曰老莊與聖教同異阮曰將無同太尉善其言而辟之為掾世號曰三語掾君見而嘲之曰一言可辟何假三阮曰苟是天下民望可無言而辟何假于一言御覽二百九又三百九十玠素抱羸病世說注六玠少有名理善易老自羸疾初不于外擅相酬對時友歎曰衛君不言言必入真至武昌見大將軍王敦敦與談論咨嗟不已世說注三玠至武昌見王敦敦與之談論彌日信宿敦顧謂僚屬曰昔王輔嗣吐金聲于中朝此子今復玉振于江表微言之緒絕而復續不悟永嘉之中復聞正始之音阿平若在當復絕倒世說注五玠穎識通達風韻標令陳郡謝幼輿敬以亞父之禮論者以為出王眉子平子武子之右世咸謂諸王三子不如衛家一兒娶樂廣女裴叔道曰妻父有冰清之姿壻有璧潤之望所謂秦晉之匹也為太子洗馬永嘉四年南至江夏與兄別于梁里澗語曰在三之義人之所重今日忠臣致身之道可不勉乎行至豫章乃卒世說注二玠咸和中墳遷于江寧丞相王公教曰衛洗馬明當改葬此君風流名士海內民望可修三牲之祭以敦舊好世說注四御覽五百五十五永和中丹陽尹劉真長鎮西將軍謝仁祖並知名時人共商略中朝人士遂及于玠或問杜弘治可得方衛洗馬不謝曰安得相比其閒可容數人世說注五御覽四百四十四及四百四十六張華駕西征鍾會次長安華兼中書侍郎從行掌軍中書疏表檄文帝善之御覽五百九十七陳壽好學善箸述師事同郡譙周少仕蜀在觀閤為郎除中書箸作佐郎撰三國志當時夏侯湛等多欲作魏書見壽作即壞己書初學記十二御覽二百三十四雷煥雷煥字孔章鄱陽人善星歷卜占晉司空張華夜見異氣起斗牛之閒華問煥見之乎煥曰此謂寶劍氣也華曰時時相吾者云君當貴達身佩寶劍此言欲效矣乃拜煥為豐城令煥到縣移獄掘獄基入四十餘尺得青石函一枚中有雙劍琢錯文采翳而未明煥初經南昌遣人取西山北巖下土二升黃白色用拭劍光豔照耀莫不驚愕乃送一劍並少黃土與華自留一劍華得劍喜置坐側曰此干將也莫邪何以不至然天生神物終當合耳此土南昌西山北巖土也不如華陰山赤土乃更封華陰赤土一斤送與煥答書云詳觀劍體真干將也君更用赤土磨拭劍鮮光逾益精明及華誅劍亡玉匣莫知所在後煥亡煥子爽帶劍經延平津劍無故墮水令人沒水逐覔見二龍長數丈盤交須臾光采徹發曜日映川御覽三百四十三又三十七略司馬無忌無忌字公壽丞子也才器超濟有文武幹襲封譙王衛軍將軍世說注八荀勖司徒缺帝問其人于勖答曰二公具瞻所歸不可用非其人昔魏文帝用賈詡為三公孫權笑之三國志注十御覽三百九十一賈充充父逵晚有子故名曰充字公閭言後必有充閭之異世說注八充妻李氏有淑性令才也世說注六王乂王乂字叔元琅邪臨沂人時蜀新平二將作亂文帝西之長安乃以為相國司馬遷大尚書出都督幽州諸軍事平北將軍世說注一山濤陳留阮籍譙國嵇康並高才遠識少有陪其契者濤初不識一與相遇便為神交初學記十八御覽四百九王澄澄風韻邁達志氣不群從兄戎兄夷甫名冠當年四海人士一為澄所題目則二兄不復措意云己經平子其見重如此是以名聞益盛天下知與不知莫不傾注後事迹不逮朝野失望及舊遊識見者猶曰當今名士也世說注五澄子微邁達有父風世說注五盧諶諶善著文章洛陽傾覆北投劉琨琨以為司空從事中郎琨敗歸段末波元帝之初累召為散騎中書侍郎不得南赴永和六年卒于胡胡中子孫過江妖賊帥盧循諶之曾孫三國志注二十二傅宣傅宣宣字世弘北地泥陽人年十三而著河橋賦有文義御覽三百八十五宣為御史中丞明法直繩內外震肅甚有威風初學記十二阮孚阮孚孚風韻疏誕少有門風世說注四阮仲容所幸姑家婢生子仲容與姑書曰胡婢遂生胡兒姑答書曰魯靈光殿賦曰胡人遙集于上楹可字曰遙集也故孚字遙集同上七阮裕阮裕裕字思擴陳留氏人祖略齊國內史父顗汝南太守裕淹通有理識累遷侍中以疾築室會稽剡山徵金紫光祿大夫不就年六十一卒世說注一引阮光祿別傳裕居會稽剡山志存肥遁同上六嵇康康長七尺八寸美音氣好容色雖土木形骸不加飾厲而龍章鳳姿天質自然然正爾在群形之中便自知非常之器世說注六初學記十九文選注二十一康性含垢藏瑕愛惡不爭于懷喜怒不寄于顏所知王濬沖在襄城面數百未嘗見其疾聲朱顏此亦方中之美範人倫之勝業也世說注一山巨源為吏部郎遷散騎常付舉康康辭之並與山絕豈不識山之不以一官遇己情耶亦欲標不屈之節以杜舉者之口耳乃竹合濤書自說不堪流俗而非薄湯武大將軍聞而惡之世說注六孫登謂康曰君性烈而才雋其能免乎三國志注二十一康臨終言曰袁孝尼嘗從吾學廣陵散吾每固之不與凎陵散于今絕矣同上又又家世儒學少有儁才曠邁不群高亮任性不修名譽寬簡有大量學不師授博洽多聞長而好老莊之業恬靜無欲性好服食常採御上藥善屬文論彈琴詠詩自足于懷抱之中以為神仙者稟之自然非積學所致至于導養得理以盡性命若安期彭祖之倫可以善求而得也著養生篇知自厚者所以喪其所生其求益者必失性超然獨達遂放世事縱意于塵埃之表撰錄上古以來聖賢隱逸遁心遺名者集為傳贊自混沌至于管寧凡百一十有九人蓋求之于宇宙之內而發之乎千載之外者矣故世人莫得而名焉三國志注二十一向秀秀字子期河內人少為同郡山濤所知又與譙國嵇康東平呂安友善並有拔俗之韻其趨舍進止無不畢同而造事營生業亦不異常與稽康偶鍛于洛邑與呂安灌園于山陽收其餘利以供酒食之費以上依御覽百九十七又八百二十四校補或率爾相攜觀原野極遊浪之勢亦不計遠近或經日乃歸復修常業以上又依御覽四百九引補不慮家之有無外笏不足拂其心弱冠著儒道論棄而不錄好事者或存之或云是其族人所作困于不行乃告秀欲假其名秀笑曰可復爾耳後康被誅秀失圖乃應歲舉到京師詣大將軍司馬文王文王問曰聞君有箕山之志何能自屈秀曰常謂彼人不達堯意本非所慕也一坐皆悅隨次轉至黃門侍郎散騎常侍世說注一秀與嵇康呂安為友取舍不同嵇康傲世不羈安放逸邁俗而秀雅好讀書二子頗以此嗤之後秀將注莊子先以告康安康安咸曰此書詎復須注徒棄人作樂事耳及成以示二子康曰爾故復勝不安乃驚曰莊周不死矣後注周易大義可觀而與漢世諸儒互有彼此未若隱莊之絕倫也世說注二謝鯤鯤從王敦下石頭數諫鯤之諷切雅正皆此類也世說注五鯤四十三卒贈太常同上三羊曼曼字延祖泰山南城人父暨陽平太守曼頹縱宏任飲酒誕節與陳留阮放等號兗州人達累遷丹陽尹為蘇峻所害世說注四曹志志字允恭好學有才行晉武帝為中撫軍迎常道鄉公于鄴志夜與帝相見帝與語從暮至旦甚器之及受禪改封鄄城公發詔以志為樂平太守歷章武趙郡遷散騎常侍國子博士後轉博士祭酒及齊王攸當之藩下禮官議崇錫之典志歎曰安有如此之才如此之親而不得樹本助化而遠出海隅者乎乃建議以諫辭旨甚切帝大怒免志官後復為散騎常侍志遭母憂居喪盡哀因得疾病喜怒失常太康九年卒諡曰定公三國志注十九庾岷岷字子居位列侍中劉曜作亂京都傾覆岷時直在省謂僚佐曰吾必死此屋內既天子蒙塵岷與許遐等侍從曜設會使帝行酒岷至帝前乃慨然流涕曜曰此動人心即時遇害御覽四百十八陸機機博學善屬文非禮不動入晉仕著作郎至平原內史世說注二成都王長史盧志與機弟雲趣舍不同又黃門孟玖求為邯鄲令于穎穎教付雲雲時為左司馬曰刑餘之人不可以君民玖聞此怨雲與志讒構日至及機于七里澗大敗玖誣機謀反所致穎乃使牽秀斬機先是夕夢黑幔繞車手決不開惡之明旦秀兵奄至機解戎服著衣幍見秀容貌自若遂見害時年四十三軍士莫不流涕是日天地霧合大風折木平地尺雪時人以為冤世說注八御覽十二孟玖欺成都王穎曰陸機司馬孫拯備知機情可考驗也穎于是收拯父子五人考掠備加踝骨皆脫出終不誣機御覽三百七十二陸雲雲字士龍吳大司馬抗之第五子機同母之弟也儒雅有俊才容貌瓌偉口敏能談博聞強記善箸述六歲便能賦詩時人以為項橐楊鳥之儔也年十八刺史周浚命為主簿浚常嘆曰陵士龍當令之顏淵也累遷太子舍人清河內史為成都王所害世說注四潘岳岳姿容甚美風儀閒畼世說注六岳夙以才穎發名其所箸述清綺絕倫為黃門侍郎為孫秀所殺三國志注二十一潘尼尼少有清才文辭溫雅初應州辟後以父老歸供養居家十餘年父終晚乃出仕尼嘗贈陸機詩機答之其四句曰猗歃潘生世篤其藻仰儀前文丕隆祖考位終太常三國志注二十一江蕤江蕤江蕤字世林御覽三百八十五年七歲葬父有酒肉食之左右或戲曰郎為孝何肉食蕤瞿然歛容遂不食御覽八百六十三引作家傳蕤年十一始知摴蒲數以為遊祖母費為說往事有以博交弈破業廢身者于是即棄五木終身不以為戲御覽八百八十五亦引作家傳御覽五百十一又七百五十四皆引作江蕤別傳江統江統字應元時太傅從事史郎庾子嵩以風韻見重亦雅敬君德每云當今可以居司徒允民望者江生其人也御覽二百八太傅東海王領州牧請為別駕與君書曰昔子師伯豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪此求者不知君舉高郄道微為賢良陳留阮宣子為直言濟北程宏叔為方正皆于時選為允御覽二百六十三統遷愍懷太子洗馬嘗上疏諫曰今西園賣醯麪茶菜藍子之屬虧敗國體同上八百六十七江惇江惇山遐為東陽風政嚴苛多任刑殺郡內苦之惇隱東陽以仁恕懷物遐感其德為微損威猛世說注二周處處字子隱吳郡陽羨人父魴吳鄱陽太守處少孤不治細行世說注六氐賊齊萬年為亂乃以處為建威將軍進軍大戰奮劍忼慨仰天嘆曰古者良將受脤鑿凶門以出蓋有進無退我為大臣以身殉國不亦可乎遂戰而死初學記十七御覽四百十七祖逖逖為豫州刺史克尸矜施不蓄資產喪亂之餘白骨未收者為之殯葬其有骨肉恩薄不收歛者皆加貶責由是百姓感化復覩太平置酒大會坐中耆老相與流涕而歎曰吾等投老更得父母死將何恨又童謠曰幸哉遺民逸豺處三辰既明遇慈父元酒清醪甘瓠脯亦何報恩歌且舞御覽二百五十八司馬晞晞字道升元帝第四子初封武陵王拜太宰少不好學尚武凶恣時太宗輔政晞以宗長不得執權常懷憤慨欲因桓溫入朝殺之太宗即位新蔡王晃首辭引與晞及子綜謀逆有司奏晞斬刑詔原之徙新安晞未敗四五年中喜為挽歌自搖大鈴使左右習和之又燕會倡伎作新安人歌舞離別之辭其聲甚悲後果徙新安世說注八司馬道子王諱道子簡文帝第五子也封會稽王領司徒揚州刺史進太傅為桓玄所害贈丞相世說注二引作孝文王傅王導王導字茂弘琅邪人祖覽以德行稱父裁侍御史導少知名家世貧約恬暢樂道未嘗以風塵經懷也世說注一引作丞相別傳王劭劭字敬倫丞相導之第五子清貴簡素風姿甚美而善治容儀雖家人近習莫見其怠情之容研味玄頤大司馬桓溫見而稱之曰可謂鳳雛累遷尚書僕射吳國內史世說注四御覽三百八十九王薈薈字敬文丞相最小子有清譽夷泰無競仕至鎮軍將軍世說注四薈為吳內郡內史其年大饑薈出私財為百姓饘粥覽八百五十九王珣王珣字元琳丞相導欴孫領軍治之子也少以清秀稱大司馬桓溫辟為主簿從討袁真封交阯望海縣東亭侯累遷尚書左僕射領選進尚書令世說注二引作王司徒傳王珉珉字季琰琅邪人丞相導孫中領軍洽少子有才藝善行書名出兄珣右累遷侍中中書令贈太常世說注二詔曰新除侍中王珉才學廣贍義理精通宜處樞近以參時務其以珉為長兼中書令初學記十一御覽二百二十陶侃侃母湛氏賢明有法訓侃在武昌與佐吏從容飲燕常有飲限或勸猶可少進侃悽然良久曰昔年少曾有酒失二親見約故不敢踰限及侃丁母憂此句以下亦見御覽五百六十一在墓下忽有二客來弔不哭而退儀服鮮異知非常人遣隨視之但見雙鶴沖天而去世說注六外國獻氍㲣公舉之曰我還國當與牙共眠牙名倓之字處靜是公庶孫小而被知以為後嗣御覽七百八庾翼薨表其子爰之代為荊州何充曰陶公重勳也臨終高讓丞相未薨敬豫為四品將軍于今不改親則道恩優游散騎未有超卓若此之授乃以徐州刺史桓溫為安西將軍荊州刺史世說注四範字道則侃第十子也侃諸子中最知名歷尚書祕書監世說注四郗鑒鑒字道徽高平金鄉人漢御史大夫郗慮後也少有體正躭思經籍以儒雅著名永嘉末天下大亂饑饉相望冠帶以下皆割己之資供鑒元皇徵為領軍遷司空太尉世說注一郗愔愔字方回高平金鄉人太宰鑒長子也淵靖純素無執無競簡私暱罕交遊歷會稽內史侍中司徒世說注五郗超超精于理義沙門支道林以為一時之俊世說注二郗曇曇字重淵鑒少子性韻方質和正沈簡累遷丹陽尹北中郎將徐兗二州刺史世說注六賀循循字彥先會稽山陰人本姓慶高祖純避漢帝諱改為賀氏父劭吳中書令以忠正見害循少嬰家禍流放荒裔吳平乃還秉節高舉元帝為安東徵循為吳國內史世說注五周顗王敦討劉隗時溫太真為東宮庶子在承門外與顗相見曰大將軍此舉有在義無有濫顗曰君年少希更事未有人臣若此而不作亂共相推戴數年而為此者乎處仲狼抗而強忌平子何在世說注三卞壺壺字望之濟陰冤句人父粹太常卿壺少以貴正見稱累遷御史中丞權門屏迹輚領軍尚書令蘇峻作亂率眾距戰父子三人俱死王難世說注五壺正色立朝百寮嚴憚貴遊子弟莫不祗肅同上七鍾雅雅字彥冑潁川長社人魏太傅鍾繇弟仲常曾孫也少有才志累遷至侍中世說志二蘇峻逼主上幸石頭雅與劉超並侍帝側匡衡與石頭中人密期拔至尊出事覺被害同上孫惠惠好學有才智晉永寧元年赴齊王冏義以功封晉興侯辟大司馬賊曹屬冏驕矜僭侈天下失望惠獻言于冏諷以五難四不可勸令委讓萬機歸藩青岱辭甚深切冏不能納頃之果敗成都王穎召為大將軍參軍是時穎將有事于長沙以陸機為前鋒都督惠與機鄉里親厚憂其致禍謂之曰子盍讓都督于王粹乎機曰將謂吾避賊首鼠更速其害機尋被戮二弟雲耽亦見殺惠甚傷恨之永興元年乘與幸鄴司空東海王越治仈下邳惠以書于越詭其姓名自稱南岳逸民秦祕之勉以勤王匡世之略辭義甚美越省其書牓題通衢招求其人惠乃出見越即以為記室參軍惠掌文疏豫參謀議每造書檄越或驛馬催之應命立成皆有辭旨累遷顯職後為廣將軍安豐內史年四十七卒惠文翰凡數十首三國吳志注六郭璞璞少好經術明解卜筮永嘉中海內將亂璞投策歎曰黔黎將同異類矣便結親暱十餘家南渡江居于暨陽世說注六璞奇博多通文藻粲麗才學賞豫足參上流其詩賦誄頌並傳于世而訥于言造次詠語常人無異又不持儀檢形質穨索縱情嫚惰時有醉飽之失友人干令升戒之曰此伐性之斧也璞曰吾所受有分恆恐用之不盡豈酒色之能害王敦取為參軍敦縱兵都輦乃咨以大事璞極言成敗不為回屈敦忌而害之世說注三庾翼翼字稚恭潁川鄢陵人也少有大度時論以經略許之兄太尉亮薨朝議推才乃以翼都督七州進征西將軍荊州刺史廿說注二翼為荊州雅有正志每以門地威重兄弟寵授不陳力竭詐何以報國雖蜀阻險塞胡負凶力然皆無道酷虐易可乘滅當此時不能掃除二寇以復王業非丈夫也于是徵役三州悉其帑實成眾五萬兼率荒附治戎大舉直指魏趙軍次襄陽耀威漢北也世說注六桓彝彝字茂倫誰國龍亢人漢五更桓榮十廿孫也父穎有高名彝少孤識鑒明朗避亂渡江累遷散騎常侍世說注一桓豁豁字朗子溫之弟累遷荊州刺史贈司空世說注六桓石秀桓石秀石秀為竟陵太守遷江州刺史非其志也治稱不煩在州郡弋釣山澤縱心游覽而已善馳射望之若畫御覽二百五十五桓沖沖字玄叔溫弟也累遷騎將軍都督七州諸軍事世說注六王湛王處沖身長八尺龍頰大鼻御覽三百六十七處沖為尚書郎外望簡縱若有遺漏然事要機輒執其中中外之間亡所辨明臺閣歸重之御覽二百十五襄城郝仲將門至孤陋非其所偶也君嘗見其女便求聘果高朗英邁母儀冠族其通餘裕皆此類世說注六引作汝南別傳王述述字懷祖太原晉陽人祖湛父承並有高名述蚤孤事親孝謹簟瓢陋巷宴安永日由是為有識所知襲爵藍田侯世說注三述常以為人之處世當先量己而後動義無虛讓是應辭便當固執其貞固不踰皆此類同上四述少真獨退靜人未常知故有晚令之言同上七王坦之坦之字文度太原晉陽人祖東海太守承清淡平遠父述貞貴簡正坦之器度淳深孝友天至譽輯朝野標的當時累遷侍中中書令令北中郎將徐兗二州刺史世說注二引王中郎傳范汪汪字玄平潁陽人左將軍略之孫少有不常之志通敏多識博涉經籍致譽于時歷吏部尚書徐兗二州刺史世說注七劉惔惔字真長沛國簫人也漢氏之後真長有雅戴雖蓽門陋巷晏如也歷司徒左長史侍中丹陽尹為政務鎮靜信誠風塵不能移也世說注一引劉尹別傳惔既令望姻婭帝室故屢居達官然性不偶俗心淡榮利雖身登顯列而每挹降閑靜自守而已同上五惔有儁才其談詠虛勝理會所歸王濛略同而敘致過之其詞當也同上王舒舒字處明琅邪人祖覽知名父會御史舒器業簡素有文武幹中宗用為北中郎將荊州刺史尚書僕射出為會稽太守以父名會累表自陳討蘇峻有功封彭澤侯贈車騎大將軍世說注四王邃邃字處重琅邪人舒弟也意局剛清以政事稱累遷中領軍尚書左僕射世說注五王廙廙字世將祖覽父正廙高朗豪率王導與庾亮遊于石頭會遇廙至爾日迅風飛颿廙倚船樓長嘯神氣甚逸以上五句亦見御覽三百九十二導謂亮曰世將為復識事亮曰正足舒其逸耳性倨傲不合己者面拒之故為物所疾加平南將軍薨世說注八王彬彬字世儒琅邪人祖覽父正並有名德彬爽氣出儕類有雅正之韻與元帝姨兄弟佐佑皇業累遷侍中從兄敦下石頭害周伯仁彬與顗素善往哭其尸甚慟既而見敦敦怪其有慘容而問之答曰向哭周伯仁情不能已敦曰伯仁自致刑戮汝復何為者哉彬曰伯仁清譽之士有何罪因數敦曰抗旌犯上殺戮忠良音辭忼慷與淚俱下敦怒甚丞相在坐代為庂解命彬曰拜謝彬曰有足疾此來見天子尚不能拜何跪之有敦曰腳疾何如頸疾以親故不害之累遷江州刺史左僕射贈衛將軍世說注四王彪之王彪之彪之從伯謂彪之曰選曹舉汝為尚書郎中可作諸王佐邪世說注四王胡之胡之字修齡琅邪臨沂人王廙之子也歷吳興太守徵侍中丹陽尹祕書監並不就拜使持節都督司州諸軍事西中郎將司州刺史世說注二胡之常遺世務以高尚為情與謝安相善也胡之治身清約以風操自居胡之少有風尚才器率舉有秀悟之稱胡之好恢諧善屬文辭為當世所重皆同上五虞𩦎𩦎字思行會稽餘姚人虞翻曾孫右光祿潭兄子也雖機榦不及潭而制行過之歷吏部郎吳興守徵為金紫光祿大夫卒世說注五𩦎未登臺鼎時論稱屈同上陸玩玩字士瑤吳郡吳人祖瑁父英在郡有譽玩器量淹雅累遷侍中尚書令左僕射尚書令贈太尉世說注二是時王導郗鑒庾亮相繼薨殂朝野憂懼以玩德望乃拜司空玩辭讓不獲乃歎息謂朋友曰以我為三公是天下無人矣時人以為知言同上五蔡充充字子尼祖睦蔡邕孫也充少好學有雅尚體貌尊嚴莫有媟慢于其前者高平劉整有儁才白衣居家而車服奇麗謂人曰紗縠吾之常服耳常遇蔡子尼在坐而終日不自安見憚如此是時陳留為大郡多人士琅邪王澄嘗經郡入境問此郡多士有誰乎吏曰有江應元蔡子尼時陳留多居大位者澄問何以但稱二人吏曰向謂君侯問人不謂位也澄笑而止充歷成都王東曹掾故稱東曹世說注八蔡謨蔡謨謨字道明濟陽考城人博學有識避地江左歷左光祿錄尚書事揚州刺史薨贈司空世說注四引蔡司徒別傳諸葛恢恢字道明琅邪陽都人祖誕司空父靚亦知名恢少有令聞稱為賢明避難江左中宗召補主簿累遷尚書令世說注三殷浩浩字淵源陳郡長平人祖識濮陽相父羨光祿勳浩少有重名仕至揚州刺史中軍將軍世說注二浩善老易能清言康伯浩甥也甚愛之同上三會稽王少著名譽有學之舉必極有德以浩為友御覽二百四十八顧悅君以古道陵遲于世入見王簡文王髮無二毛而君已斑白問君年乃曰卿以偏蚤白君曰松柏之姿經霜猶茂蒲柳之質望秋先零受命之異也王稱善久之世說注二孔愉愉子敬康會稽山陰人初永嘉大亂愉入臨海山中不求聞達中宗命為參軍討華軼有功封餘不亭侯愉少時嘗得一龜放于不溪中龜中路左顧者數過及後鑄印而龜左顧更鑄猶如此印師以聞愉悟取而佩焉累遷尚書左僕射贈車騎將軍世說注四謝安王珣以疾辭職歲餘卒桓玄與會稽王導子書曰珣神情朗悟經史明徹風流之美公私所寄忽爾喪失歎悼之深豈但風流相悼而已御覽三百八十謝玄玄能清言善名理世說注三引謝玄別傳玄字幼度鎮西將軍奕第三子也神理明俊善微言叔父太傅嘗與子姪燕集問武帝任山公以三事任以官人至于賜予不過斤合當有旨不玄答有辭致也世說注二引謝車騎家傳氐賊苻堅傾國大出眾號百萬朝廷遣諸軍拒之凡八萬堅進屯壽陽玄為前鋒都督與從弟琰等選精銳決戰射傷堅俘獲數萬計得偽輦及雲母車寶器山積錦罽萬端牛馬驢騾駝十萬頭匹世說注四引謝車騎傳王獻之獻之祖父曠淮南太守父羲之右將軍獻之咸寧中詔尚餘姚公主遷中書令卒世說注一許邁邁好養生遣妾歸家東遊採茶于桐廬山欲斷穀以山近人不得專壹移入臨安自以無復反期乃改名遠遊書與婦別御覽四百八十九邁少名暎高平閻慶等皆就暎受集暎曰閻君可服氣以斷穀彭君宜餌藥以益氣慶等將去暎為燒香以五色煙出暎亦自去莫知所在初學記二十五御覽八百七十一邁少名映有鼠齧映衣乃作符召鼠莫不畢至于中庭映曰齧衣者留不齧衣者去群鼠並去唯一鼠獨住伏于中庭而不敢動御覽九百十一延陵之茅山是洞庭西門潛通五岳同上四十一孫放放字齊莊監君次子也年八歲太尉庾公召見之放清秀欲觀試乃授紙筆令書放便自疏名字公題後問之曰為欲慕莊周邪放書答曰意欲慕之公曰何故不慕仲尼而慕莊周放曰仲尼生而知之非希企所及至于莊周是其次者故慕耳公謂賓客曰王輔嗣應答恐不能勝之卒長沙王相世說注二庾公建學校孫君年最幼入為學生班在諸生之後公問君何獨居後答曰不見船拖耶在後所以正船御覽七百十一放兄弟並秀異與庾翼子園客同主為學主園客少有佳稱因談笑嘲放曰諸孫于今為盛盛監君諱也放即答曰未若諸庾之翼翼放臨機制勝時人仰焉司馬景王陳鍾諸賢相酬無以踰也世說注七君性好音能操琴及琵琶以自散御覽五百八十三顧和和字君孝吳郡人祖容吳荊州史父相晉臨海太守和總角知名族人顧榮雅相器愛曰此吾家之麒驥興衰宗者必此子也顧球時為揚州別駕亦有令聞顧榮謂球曰君速步君孝如是超鄉矣御覽二百六十三又四百四十四和累遷尚書令世說注三袁喬喬字彥升陳郡人父瓌光祿大夫喬歷尚書郎江夏相從桓溫平蜀封湘西伯益州刺史世說注二引袁氏家傳喬有文才同上三袁躭袁躭躭子彥道陳郡陽夏人魏中郎令渙曾孫也魁梧爽朗高風振邁少倜儻不羈有異才士人多歸之仕至司徒從事中郎世說注七王雅雅字茂建東海沂人少知名世說注八王恭恭清廉貴峻志存格正起家著作郎歷丹陽尹中書令出為五州都督前將軍青兗二州刺史世說注一庾袞次兄有疾癘氣方殷袞納漿粥扶持不舍晝夜友愛之至本之天性初學記十七引庾袞別傳君妻樂氏生子澤初君與妻捃而產于澤遂以命之御覽八百二十四引庾異行孫晷親戚有窮老者晷或推被以䘏之竟寒不解帶而寢御覽七百七顏含顏髦字居道含之子也少慕家業惇于孝行儀狀嚴整風貌端美大司馬桓公見而歎曰顏侍中廟堂之望也喉舌機要御覽二百十九又三百八十九許肅肅為愍帝侍中左衛將軍麴武將與肅齊心拒守而外救已退城遂陷沒幽逼愍帝送于平陽肅復冒難侍帝左右劉載乃以帝為歸漢王頃之陰行鴆毒帝因食心悶欲見許侍中肅馳詣前相見帝已不能復語肅曰不審陛下尚識臣不帝猶能執肅手流涕肅歔欷登床帝遂殂于扶抱之中晝夜號泣哀感異類以上亦見初學記十七載外欲明己不害乃偽責諸臣欲盡誅之群臣迸竄唯肅獨曰備立故臣願乞得殯殮然後就戮載特聽許事訖詣載曰國亂不能匡君亡不能死舉目莫非愧恥將何顏以存所以忍辱正以山陵未畢故耳微情已敘甘就刑戮賊共義之曰此晉之忠臣宜加甄賞遂從議故得全免御覽四百十八曹攄攄為洛陽令于時大雪而宮門夜忽失行馬攄曰此非他竊理可保明必是門士以療寒驗之而具服御覽十二潘京陳躭初為州主簿司空何次道帢偏岸嘲躭頓帢有所蔽也應聲報曰躭惴鉯蔽有明府岸以示無御覽六百八十八杜夷君在孩抱之中異于凡童舉宗奇之年六七歲在縣北郭與小兒輩為竹馬戲有車行老公停車視之歎曰此有奇相吾恨不見御覽三百八十五引杜祭酒別傳桓宣武館于赤蘭橋南曰延賢里御覽三百三十七君曾新作被㬉眠不覺晏起乃歎㬉便眠使人亡起異事因令看陌上有寒苦人舉被乞之常眠布被中同上三百九十三又七百七君弟三人隨道士邢邁入宣城沍縣白水山去縣七十里餌朮黃精經歷年所有鹿走依舍邊伏眠邁等怪之乃為虎所逼邁乃呪虎退鹿經日乃去同上九百六君年五十二當其終亡安厝先塋帛布轜車喪儀儉約執引者皆三吳令望及北人賢流御覽五百五十五何禎禎廬江潛人父他字文奇有雋才早卒禎在孕而孤生遇荒亂歸依舅氏齠齔乃追行喪哀泣合禮鄉邑稱焉十餘歲耽志博覽研精群籍名馳淮泗御覽三百八十五徐邈君諱邈字仙民東莞人岐嶷即明惠聰悟七歲涉學詩賦成章御覽三百八十五邈舉世諮承傳為定範舊疑歲神在卯此宅之左即彼宅之右地何得俱忌邈以為太歲之屬自是遊神譬如日出之時向東背朔非為定體同上百八十范宣宣字子宣陳留人漢萊蕪長范丹後也年十歲能誦詩書兒童時手傷改容家人以其年幼皆異之徵太學博士散騎常侍一無所就年五十四卒世說注一左思思字太沖齊國臨淄人父雍起于筆札多所掌練為殿中御史思蚤喪母雍憐之不甚教其書學及長博覽名文遍閱百家司空張華辟為祭酒賈謐舉為祕書郎謐誅歸鄉里專思箸述齊王冏請為室參軍不起時為三都賦未成也後數年疾終其三都賦敘定至終乃上初作蜀都賦云金馬電發于高崗碧雞振翼而雲披鬼彈飛丸以礌礉火井騰光以續曦今無鬼彈句其賦往往不同思為人無吏幹而有文才又頗以椒房自矜故齊人不重也世說注二思造張載問崏蜀事交接亦疏皇甫謐西州高士摯仲治宿儒知名非思倫匹劉淵林衛伯輿並蚤終皆不為思賦序注也凡諸注解皆思自為欲重其文故假時人名姓也同上趙至至字景真代郡人流客緱氏令新之官至年十三與母共傍觀母曰汝先世本非微賤家也世亂流離遂為士仵耳後能至此不至答曰可耳便求就師讀書早起聞父耕叱牛聲釋書而泣師問其故答曰自傷不能致榮使老父不免勤苦師大異之稱其當為奇器御覽三百八十五褚陶陶字季雅吳郡錢塘人褚先生後也陶聰慧絕倫年十三作鷗鳥水磑二賦宛陵嚴仲弼見而奇之曰褚先生復出矣弱不好弄清淡閑默以墳典自娛語所親曰聖賢備在黃卷中舍此何求州郡辟不就吳歸命世祖補臺郎建中校尉司空張華與陶書曰一陵龍躍于江漢彥先鳳鳴于朝陽自此以來常恐南金已盡而復得之于吾子故知延州之德不孤淵岱之寶不匱仕至中尉世說注四引家傳羅含羅含子君章桂陽棗陽人蓋楚熊姓之後啟土羅國遂氏族焉後寓湘境故為桂陽人含臨海太守彥曾孫滎陽太守綏少子也桓宣武辟為別駕以官廨諠擾于城西池小洲上立茅茨伐木為床織葦為席布衣蔬食晏若有餘桓公嘗謂眾坐曰此自江左之清秀豈荊楚而已累遷散騎常侍廷尉長沙相致仕中散大夫門施行馬含自在官舍有一白雀棲集堂宇及致仕還家階庭忽蘭菊挺生豈非至行之徵邪世說注四御覽九百二十二又九百八十三按此引作羅府君別傳刺史庾亮初命含為部從事桓溫臨州轉參軍世說注五刺史庾翼以親賢之重作鎮方岳搜揚楚楚匪蘭弗刈仍辟含荊州部從事御覽二百六十五含少讀書臥夢一鳥文色異常徑飛入口同上三百九十三又九百二十八引吞飛鳥卵四字王濛濛字仲祖太原晉陽人其先出自周室經漢魏世為大族祖父佐北軍中候父訥葉令濛神氣清韶年十餘歲放邁不群弱冠檢尚風流雅正外絕榮競內寡私欲辟司徒掾中書郎以后父贈光祿大夫世說注二引王長史別傳丞相王導辟名士時賢協贊中興旌命所加必延俊乂辟濛為掾世說注七濛為中書侍郎在職四年無人對又遷司徒左長史少選四人頻滿以濛難與比肩故也初學記十七御覽二百二十濛之交物虛善納善恕而後行希見其喜慍之色凡與一面莫不敬而愛之然少孤事諸母甚謹篤義穆戾不修小潔以清貧見稱世說注五濛與沛國劉惔齊名時以濛比袁曜卿惔比荀奉倩而共交甚相知賞也同上濛性和暢能清言談道貴理中簡而有會迥略古賢顯默之際辭旨劭令往往有高致世說注五濛永和初卒年三十九沛國劉惔與濛至交及卒惔深悼之雖友于之愛不能過也同上王蘊蘊字叔仁為吏部郎欲使時無屈滯曾下鼓急出日𣅳乃至家去臺數里高褰車帷先後與語不得進也一官缺求者十輩蘊連狀呈宰錄曰某人有地某人有才不得者甘心無怨御覽二百十六孫登孫登字公和汲郡共縣人清淨無為其情志悄如也好讀書彈琴頹然自得觀其風神若遊六合之外者當魏末處共北山山中以石窟為宇編草自覆阮嗣宗聞登而往焉適見公和苫蓋被髮端坐巖下鼓琴嗣宗自下趨進冀得與言既坐莫得與言嗣宗乃嘹嘈長嘯與琴音諧會雍雍然登乃逌爾而笑因嘯和之妙響動林壑風氣清太元御覽三百九十二又五百七十九夏統夏統字仲御永與人與母兄弟居恒星行夜歸採秬求食母老病不綜家事仲御四鼓起洒掃庭內鑽火炊爨之後徑便入野御覽四百三十一仲御從父家女巫章丹陳殊二人妍姿冶媚清歌妙舞狀若飛仙上亦見初學記十五仲御當正會宗弟承問御曰黃帳裹西施之孫鄭袖之子膚如凝脂顏如桃李徘徊容與載進載止彈琴而奏清角翔風至而白雲起若乃攜手交舞流盼頡頏足踰鞞鼓口銜笙簧丹裙赫以四序素耀煥以揚光赴急弦而折倒應緩節以相佯遠望而雲近視而雪舒紅顏而微笑啟朱脣而揚聲御覽五百六十八激南楚吹胡笳風雲為之動搖星辰為之變度初學記十五御覽五百八十一夏仲御詣洛到三月三日洛中王公以下莫不方軌連軫並至南浮橋方祓禊男則朱服耀路女則錦綺粲爛仲御時在船中曝所市藥雖見此輩穩坐不搖賈充望見深奇其節顧相與語此人有心膽有似冀缺走往問船中安坐者為誰仲御不應重問徐乃答曰會稽北海閒民夏仲御御覽二十事類賦注四夏統別傳注曰蘞初生合米擣作粄御覽八百五十一郭翻翻字道祥武昌人御覽五百五十五翻經河墜力于水路人有為取者翻因與之路人不取至于三四路人固辭翻曰爾向不取我豈能復得乎路人曰吾若取此物為天地鬼神所責矣知其終不受乃沈刀于向所失處路人悵然乃復沒為取之翻于是不逆其意十佩刀價以與之御覽四百二十四翻遺令儉葬唯以兩卷老子示存道德同上五百五十五郭文郭文舉河內人也懷帝末齊江至餘杭市賣箭箸易鹽米以樹皮作囊中御覽七百四文以石為釜以竹為甑同上七百五十七佛圖澄里人佛圖澄不知何許人出于燉煌好佛道出家為沙門永嘉中至洛陽宜京師有難潛遁草澤閒石勒雄異好殺害因勒大將軍郭默略見勒以麻油塗掌占見吉凶數百里外聽浮圖鈴聲逆知禍福勒甚敬信之虎即位亦師澄號大和尚自知終日開棺無屍唯袈裟法服在焉世說注二石勒時天旱佛圖澄于石井岡掘得死龍長尺餘漬之以水良久乃蘇呪而祭之龍騰空而上即大雨降因名石井為龍岡事類賦注二十八澄以鉢盛水燒香呪之須臾鉢中生青蓮花御覽七百五十九石虎時自正月不雨澄詣滏口祠稽首曝露即日二白龍降于祠下于是雨遍千里也御覽六十四後趙尚書張離張良家富事佛起大塔澄謂曰事佛在于清淨無大慈矜為心檀越雖儀奉天法而貪恡未已遊獵無度積聚不窮方受見世之罪何福報之可希也同上六百五十八引佛圖澄傳高坐和尚胡名尸黎密西域人傳云國王子以國讓弟遂為沙門永嘉中進到此土止于大市中和尚天姿高朗風韻遵邁丞相王公一見奇之以為吾之徒也周僕射領選撫其背而歎曰若選得此賢令人無恨俄而周侯遇害和尚對其靈坐作胡祝數千言音聲高暢既而揮涕收淚其哀樂廢興皆此類性高簡不學晉語諸公與之語皆因傳譯然神領意得頓在言前世說注二庾亮周顗桓彝一代名士一見和尚披衿致契曾為和尚作目久之未得有云尸利密可稱卓朗于是桓公咨嗟以為標之極似宣武嘗云少見和尚稱其精神淵箸當年出倫其為名士所嘆如此同上五王公曾詣和上和上解帶偃伏語言神解見尚書令卞望之便歛衿飾容時歎皆得其所同上七道安釋道安者常山薄柳人本姓衛年十二作沙門神性聰敏而貌至陋佛圖澄莖重之值石氏亂於陸渾山木食修學為慕容駿所逼乃住襄陽以佛法東流經籍錯謬更為條章標序篇目為之注解自支道林等皆宗理無疾卒世說注四引安和上傳竺法汰者體器弘簡道情冥到法師友而善焉一說法汰安公弟子也世說注三引安法師傳初魏晉沙門依師為姓故姓各不同安以為大師之本莫尊釋迦乃以釋命氏後獲增一阿舍經果稱四河入海無復河名既懸與經符遂為永式御覽六百五十五引道安傳支遁遁本姓關氏陳留人或云河東林慮人幼有神理聰明秀徹初至京師太原王濛甚重之曰造微之功不減輔嗣御覽六百五十五法師研十地則知頓悟于七住尋莊周則辯聖人之逍遙當時名勝咸味其音旨道賢論以七沙門比竹林七賢遁心向秀雅尚老莊二子異時風尚玄同也世說注三遁任心獨往風期高亮同上五遁神心警悟清識玄遠嘗至京師王仲祖稱其造微之功不異王弼同上遁神悟機發風期所得自然超邁也同上法虔道林同學也儁朗有理義遁甚重之同上遁太和元年終于郯之石城山因葬焉同上遁每標舉會宗不留心象喻釋解章句或有所漏文字之徒多以為疑謝安石聞而善之曰此九方皋之相馬馬也略其玄黃取其儁逸同上辛憲英辛憲英夫人字憲英衛尉肅侯毗之女不好華麗琇上夫人子帔緣以錦不肯服從外孫胡母楊上夫人錦被夫人反臥之御覽八百十五憲英聰明有才鑒初文帝與陳留王爭為太子既而文帝得立抱毗頸而喜曰辛君知我喜不毗以告憲英憲英歎曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚而喜何以能久魏其不昌乎弟敞為大將軍曹爽參軍司馬宣王將誅夾因爽出閉城門大將軍司馬魯芝將爽府兵犯門斬關出城門赴爽來呼敞俱去敞懼問憲英曰天子在外太傅閉城門人云將不利國家于事可得爾乎憲英曰天下有不可知然以吾度之太傅殆不得不爾明皇帝臨崩把太傅臂以後事付之此言猶在朝士之耳且曹爽與太傅俱受寄託之任而獨專權勢行以奢驕于王室不忠于人道不直此舉不過誅曹爽耳敞曰然則事就乎憲英曰得無殆就爽之才非太傅之偶也敞曰然則敞可以無出乎憲英曰安可以不出職守人之大義也凡人在難猶或恤之為人執鞭而棄其事不祥不可也且為人死為人任親昵之職也從眾而已敞遂出宣王果誅爽事定之後敞歎曰吾不謀于姊幾不獲于義逮鍾會為鎮西憲英謂從子羊祜曰鍾士季何故西出祜曰將為滅蜀也憲英曰會在事縱恣非持久處下之道吾畏其有他志也祜曰季母勿多言其後會請子琇為參軍憲英憂曰他日見鍾會之出吾為國憂之今日難至吾家此國之大事不可得止也琇固請馬文王文王不聽憲英語琇曰行矣戒之古之君子入則致孝于親出則致節于國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其惟仁恕乎汝其慎之琇竟以全身憲英年至七十有九泰始五年卒三國志注二十五王敦敦字處仲琅邪臨沂人少有名理累遷青州刺史避地江左歷侍中丞相大將軍揚州牧以罪伏誅世說注三敦子應字安期官至武衛將軍御覽二百三十七王含含字處弘琅邪臨沂人累遷徐州刺史光祿勳與弟敦作逆伏誅世說注二桓溫溫字元子譙國龍亢人漢五更桓榮後也父彝有識鑒溫少有豪邁風氣為溫嶠所知累遷琅邪內史世說注二溫以永和元年自徐州遷荊州刺史在州寬和百姓安之同上永和二年溫平蜀初朝廷以蜀處險遠而溫眾寡少懸軍深入甚以憂懼而溫直指成都李勢面縛同上四永和四年進征西大將軍鎮西夏時逆胡未誅餘燼假息溫親勒郡卒建旗致討清蕩伊洛展祭園陵世說注二興寧二年以溫克復舊京肅靜華夏進都督中外諸軍事侍中大司馬加黃鉞使入參朝政同上五溫以太和四年上疏自征鮮卑同上三薨諡宣武侯同上二孟嘉嘉字萬年江夏鄳人曾祖父宗吳司穴祖父揖晉廬陵太守宗葬武昌新陽縣子孫家焉嘉少以清操知名太尉亮領江州辟嘉部廬陵從事下都還亮引問風俗得失對曰待還當問從事吏亮舉麈尾掩口而笑語弟翼曰孟嘉故是盛德人轉嘉為勸學從事太傅褚裒有器識為豫章太守出朝亮盛修學教高選儒官正旦大會州府人士時彥悉集嘉坐次第甚遠裒問亮曰聞江州有孟嘉其人何在亮曰在坐卿但自覓裒歷觀久之指嘉謂亮曰此君小異將無是乎亮欣然而笑喜裒得嘉奇嘉為裒所得乃益器之以上亦見御覽二百六十五又四百四十四後為征西桓溫參軍既知其政溫甚重之九月九日溫遊龍山參寮畢集時佐吏並著戎服風吹嘉帽墮落溫戒左右勿言以觀其舉止嘉初不覺良久如廁溫命取還之孫盛時在坐溫授盛紙筆命作文嘲之成著嘉坐處嘉還見之笑而請紙筆即答了不容思四坐嗟嘆以上亦見初學記四御覽六百十七嘉喜酣暢愈多不亂溫問酒有何好而卿嗜之嘉曰明公未得酒中趣爾又問聽伎絲不如竹竹不如肉何也答曰漸近自然轉從事中郎遷長史年五十三卒世說注四又又君諱嘉字孟年江夏鄳人曾祖父宗以孝行稱仕吳司馬祖揖元康中為廬陵太守宗葬武昌新陽縣子孫家焉遂為縣人君少失父奉母與二弟居娶大司馬長沙桓公陶侃第十女閨門孝友人無能閒鄉閭稱之沖默有遠量弱冠儔類咸敬之桓玄玄字敬道譙國龍亢人大司馬溫少子也幼童中溫甚愛之命以為嗣年七歲襲封南郡公拜太子洗馬世說注一玄初拜太子洗馬時朝廷以溫有不臣之迹故抑玄為素官同上七玄為義興太守不得志少時去職歸其國與荊州刺史殷仲堪素舊情好甚隆同上一玄克荊州殺殷仲道護及仲堪參軍羅企生鮑季札皆仲堪所親仗也同上一玄既克殷仲堪後楊佺期遣使諷朝廷朝廷以玄都督八州領江州荊州二刺史同上三祖約約字士少范陽遵人累遷平西將軍豫州刺史鎮壽陽與蘇峻反峻敗約投石勒約本幽州冠族賓客填門勒登高望見車駿大驚約又使占奪鄉里先人田地地主多恨勒惡之遂誅約世說注四石勒石勒字士龍上黨武鄉人匈奴之苗裔也雄勇好騎射晉永康中流宕山東寄旅平原荏平界與平原荏平人師歡家庸耕耳恆聞鼓角鞞鐸之音勒私異之以上亦見御覽三百三十八又八百二十二初勒鄉里原上地中生石日長類鐵騎之象園中生人參葩葉甚盛于時父老相者皆云此胡體貌奇異有大志量其終不可知勸邑人厚遇之自園中以下亦見御覽九百九十一人多哂而不信永嘉初豪傑並起與胡王陽等十八騎詣汲桑為左前督桑敗共推勒為主攻下州縣都于襄國世說新語注四勒稱趙王令武鄉耆舊赴襄國拜李陽參軍都尉勒微時居邑人李陽相近陽性剛愎每輕勒與爭漚麻池共相打揲互有勝負御覽四百九十六冬十一月大雪平地三尺勒主簿程朗諫勒不從出獵墮馬顧左右曰不從主簿之言而致墮馬賜朗絹百疋以旌忠亮御覽八百三十二以咸和三年改元曰太和荏平民師懽上黑兔令曰按記應白兔為瑞此黑兔曰祥外檢典舊議者以為黑兔見水德之祥往公孫臣以漢家土行當有黃龍為瑞後黃龍見于成紀遂從土德今大趙革命以水受金夫兔陰獸玄水色黑色見以表應行以推之黑兔應云云類聚九十九後僭正號死諡明皇帝世說注四石虎石虎字季龍勒從弟無十七八身長七尺五寸好弓馬私獵迅健有勇力同時等類多畏憚之御覽三百八十六武鄉長城縣民韓強在長城縣西山巖石闕中得玄璽一所方四寸厚二寸與璽同文曰受命于天既壽永昌虎以為瑞御覽六百八十二書鈔百三十一引誤作石勒別傳十三年春二月虎率三公九鄉躬耕籍田后率三夫人命婦祠先蠶于近郊是歲八月雨雪大寒行旅凍死御覽三十四荀氏家傳荀顗年踰耳順而母年九十色養烝烝以孝聞當時在喪顦顇貌不可識蓬首環絰奉迎節使若嬰孩之號哀慟旁人傅玄著書稱荀與何曾曰文王之道事其親者其順昌何侯乎其荀侯乎古稱曾閔今有荀何初學記十七顗為司空文帝平蜀議復五等表魏朝使公定禮儀中護軍賈充正法律尚書僕射婓秀議官制公遂刪定舊文行正式為一代之典書成奏藏于祕府其服色旗幟法駕之式禮樂特犧牲柴燎之典祫禘遷毀配食之制及于明堂辟雍之儀皆公所議定朝廷歸其美公既為台輔德望清重加以留心禮教以年耆多疾不數朝見詔使侍中任愷諮問政化所由行否御覽二百八荀愷字茂伯小而智外祖晉宣王甚器之字為虎子弟悝為龍子每謂曰俟汝長大當共天下御覽三百六十三愷晉武帝為侍中三國志注十車騎將軍悝未茂中山濤舉之為太子右衛率稱君清和理正從容顧問動可觀採真侍衛之美者御覽二百四十七荀邈除太原榆次令為政以德人懷之時有鳳皇集其境內晉武帝下詔襃美泰始三年卒吏人如喪親戚為之樹碑其序曰仰之如日月敬之如神明愛之如父母樂之如時雨御覽二百六十八荀隱祖昕樂安太守父岳中書郎隱與陸雲在張華坐語互相反覆陸連受屈隱辭旨美麗張公稱善云世有此書尋之未得歷太子舍人廷尉平蚤卒世說注七荀勖字公曾年十二能通春秋屬文外祖鍾繇甚奇之常稱此兒當繼司空御覽三百八十五荀番字大堅為司空劉琨表于太子曰司空荀蕃朝廷之舊臣奕世忠勤乃心皇家具瞻之望唯蕃而已宜增位號授分陝之重永令臣等有所憑準御覽二百八荀組字大章中宗為晉王時將徵為司徒問太常賀循循曰組舊望清重勤勞顥著遷訓五品以統人倫實充人望詔以組為司徒御覽二百八荀邃字仲陽隱居不仕夫人有至行時歲荒饑有餘米每來糶之者夫人恆叩㧻其斛糴者歸傾量輒過其本時人號曰昂斛夫人荀闓字道明性清靜善談訥遷光祿大夫以君面似胡明帝謂為神明胡子御覽二百四十三頵字溫伯為羽林右監早卒頵子崧字景猷三國志注十荀羨未字令則七歲隨父在石頭蘇峻愛其姿神數喚之年十五擬國婚之選君不欲連姻帝室乃遠遁長沙監司追尋不獲已遂尚潯陽公主風器英秀識準標貴明鬚眉美音氣俯仰眄睞容止可則御覽百五十四又三百八十又三百八十九荀羨與沛國劉真長太原堊仲祖陳郡商邱殷洪源並著情契太宗時居阿衡之任虛中誘納賓客賢哲與羨等數人為布衣之好御覽四百九惟我之先生于有晉人物盈朝袞衣暐華六世九公不亦偉乎磊落瓌奇光昭合同已獨步于古今拊萬世而孩之矣中興丞相王公歎曰自八龍以後榮寵莫二為天下貴門御覽四百七十裴氏家傳裴榮字榮期河東人父稺豐城令榮期少有風姿才氣好論古今人物撰語林數卷號曰裴子世說注二陶氏家傳陶基字叔先璜父為交州刺史始夷人不識禮義男女互相奔隨生子乃不知父君乃教以婚姻之道訓以父子之恩道之以禮齊之以刑設庠序立學校合境化之莫不悅之御覽二百五十八陶迴字恭淵為大司徒王導從事中郎為人正直不撓導亦以此重焉每曰陶中郎有輔佐之才真國器也御覽二百九陶猷字恭豫王導以君江東儁望請為右軍長史君恪勤王事每當朝日恆夙夜就路及到府門輒先眾僚為人美容止善談論亦以此見稱當世焉御覽二百四十八華嶠譜敘歆有三子表字偉容年二十餘為散騎侍郎時同僚諸郎共平尚書事年少並兼厲鋒氣要君名譽尚書事至或有不便故遺漏不視及傳書者去即入深文論駮惟表不然事來有不便輒與尚書共論盡其意主者固執不得已然後共議司空陳泰等以此稱之以上亦見御覽二百二十四仕晉歷太子少傅太常稱疾致仕拜光祿大夫性清淡常慮天下退理司徒李胤司隸王密等等稱曰若此人者不可得而貴不可得而賤不可得而疏中子博歷三縣內史治有名迹少子周黃門侍郎常山太守博學有文思中年遇疾終于家表有三子長子廙字長駿三國志注十三庾氏譜嶷字劭然潁川人子䨹字玄默晉尚書陽翟子嶷弟遁字德先大中大夫遁胤克昌為世盛門侍中峻河南尹純皆遁之子豫州牧長史顗遁之孫太尉文康公亮司空冰皆遁之曾孫貴達至今三國志注十一溫氏譜序晉大夫郤至封于溫子孫因氏居太原祁縣為郡著姓世說注五嶠父襜娶清河崔參女同上八嶠初娶高平李𣈶女中娶琅邪王詡女後娶廬江何邃女同上袁氏譜悅字元禮陳郡陽夏人父朗給事中仕至驃騎咨議太元中悅有寵于會稽王每勸專覽朝權王頗納其言王恭聞其說言于孝武乃誣以他罪殺悅于車中既而朋黨同異之聲播于朝野矣世說注八皇甫謐自序士安每母病輒推燥居溼以袷易單御覽七百三十九皇甫謐年二十不學遊蕩無度或以為癡嘗得果輒進叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我同上九百七十八士安始志乎學而自號玄晏先生文選注四十五杜預自敘少而好學在家則滋味經籍居官則畢力理台公家之事知無不為御覽四百三十一又六百十四梅陶自敘余居中丞曾以鞭皇太子傅親友莫不致諫余笑而應之曰堂高由陛皇太子所以得崇于上由吾奉王憲于下也豈其枉道取媚皇太子特見延賜以清讌御覽六百四十九王彪之自敘余自求致仕詔累不聽因扇上有二疏畫作詩一首以述其意御覽七百五十趙至自敘至字景真長七尺四寸潔白黑髮明眉赤脣髭鬢不多御覽六十八袁氏世紀渙有四子侃㝢奧準侃字公然論議清當柔而不犯善與人交在興廢之間人之所趣務者謙退不為也時人以是稱之歷位黃門選部郎號為清平稍遷至尚書早卒㝢字宣厚精辯有機理好道家之言少被病未官而卒奧字公榮行足以厲俗言約而理當終于光祿勳準字孝尼忠信公正不恥下問唯恐人之不勝己以世事多險故常恬退而不敢求進著書十餘萬言論治世之務為易周官詩傳及論五經滯義聖人之微言以傳于世三國志注十一虞氏家記虞潭為右衛將軍太夫人年高求解職被詔不聽特假百日迎母東歸起養親堂親集會作詩言志御覽百七十六吳山城白門蓋吳王闔閭所作也至秦始皇帝守宮吏燭燕窟失火燒宮而此樓故存同上潭母太夫人薨宜都郡即世五十九載改殯脩構窀穸靈柩住而莫前群從咸以喪事有往無反不應遷移潭以昔文王之葬王季既定而洪水出截冢棺椁文王乃設張屋出柩三日群臣臨之然後葬此則上聖之遺令載在篇籍遂奉遷神柩權停幕屋使子孫展哀晨夕宗放相臨允合張屋之儀也天子給太夫人俳徊車謁者送葬禮儀光備合葬于舊壙御覽五百五十五王氏世家褘之字文劭述次子少知名尚尋陽公主仕至中書郎未三十而卒坦之悼念與桓溫稱之贈散騎常侍世說注五嵇氏世家嵇含字君道為中書侍郎書檄雲集莫不立草御覽二百二十又五百九十七不季倫本事崇有珊瑚如意長三尺二寸御覽七百三徐江州本事徐寧字安類東海剡人通朗有德素少知名初為輿縣令譙國桓彝有人倫鑒識常去職無事至廣陵尋舊遇風停浦中素日在船憂邑上岸消搖見一空宇有似廨署彝訪之云輿縣廨也令姓徐名寧彝既獨行思逢悟賞聊造之寧清惠博涉相遇怡然遂停宿因留數夕與寧結交而別至都謂庾亮曰吾為卿得一佳吏部郎問所在彝即敘之累遷吏部郎左將軍江州刺史世說注五趙吳郡行狀穆字季子汲郡人真淑平粹才識清通歷尚書郎太傅參軍事太傅越與穆及王承阮瞻鄧攸書曰禮八歲出就外傅十年曰幼學可以漸先王之教也然學之所受者淺體之所安者深是以閑習禮度不如式瞻軌儀諷詠遺言不如親承辭旨小兒毗既無令淑之資未聞道德之風欲屈諸君時以閑豫周旋燕誨也穆歷晉明帝師冠軍將軍吳郡太守封南鄉侯世說注五
